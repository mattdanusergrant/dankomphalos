name: Deploy stable

# Pulls a snapshot of a prototype repo at a chosen ref and commits it into
# dankomphalos/<project>/. Trigger from the Actions tab → "Deploy stable".

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Which prototype to bump'
        required: true
        type: choice
        options:
          - sigil-tactics
          - ronin-survivor
          - ripping-packs
          - switchback-td
          - bloom-again
          - baduk-blitz
          - prism-pond
          - mosslings
      ref:
        description: 'Branch, tag, or short SHA (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dankomphalos
        uses: actions/checkout@v4

      - name: Clone prototype at ref
        run: |
          set -euo pipefail
          mkdir -p _src
          cd _src
          git clone --depth 1 --branch "${{ inputs.ref }}" \
            "https://github.com/mattdanusergrant/${{ inputs.project }}.git" \
            || git clone "https://github.com/mattdanusergrant/${{ inputs.project }}.git" && \
               cd "${{ inputs.project }}" && git checkout "${{ inputs.ref }}"

      - name: Snapshot into subfolder
        run: |
          set -euo pipefail
          PROJECT="${{ inputs.project }}"
          rm -rf "$PROJECT"
          mkdir -p "$PROJECT"
          # copy everything except git metadata
          rsync -a --exclude='.git' --exclude='.github' "_src/$PROJECT/" "$PROJECT/"
          rm -rf _src
          # record what we shipped
          cd "$PROJECT" && git -C "../" log -1 --format='%H' > .ship-sha 2>/dev/null || true

      - name: Commit & push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.project }}"
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "deploy(stable): ${{ inputs.project }} @ ${{ inputs.ref }}"
          git push
