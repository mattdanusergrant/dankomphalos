<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Dank Omphalos — Two paths for the artist: bulk discount vs future returns, with example calculations">
  <title>Two paths for the artist</title>
  <defs>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#8A2433" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#8A2433" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="botGlow" cx="100%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#B8965A" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#B8965A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mark" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#B8965A"/>
      <stop offset="30%" stop-color="#B8965A"/>
      <stop offset="32%" stop-color="#3A1018"/>
      <stop offset="100%" stop-color="#3A1018"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="#0B090C"/>
  <rect width="1080" height="1080" fill="url(#topGlow)"/>
  <rect width="1080" height="1080" fill="url(#botGlow)"/>

  <!-- brand -->
  <g transform="translate(540 95)" font-family="Georgia, serif">
    <circle cx="-180" cy="-7" r="14" fill="url(#mark)" stroke="#B8965A" stroke-opacity="0.55" stroke-width="1"/>
    <text x="-150" y="0" text-anchor="start" font-size="26" font-weight="700" letter-spacing="4.5" fill="#E9E2D4">DANK OMPHALOS</text>
  </g>

  <!-- kicker -->
  <text x="540" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="18" letter-spacing="6" fill="#B8965A" font-weight="700">TWO PATHS FOR THE ARTIST</text>
  <line x1="500" y1="198" x2="580" y2="198" stroke="#B8965A" stroke-opacity="0.55" stroke-width="1"/>

  <!-- ============ PATH I — BULK DISCOUNT ============ -->
  <g transform="translate(40 230)">
    <rect width="500" height="780" fill="#15121A" stroke="#2A2430" stroke-width="1" rx="3"/>

    <text x="250" y="68" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="28" fill="#B8965A" letter-spacing="2">I.</text>
    <text x="250" y="122" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="30" fill="#E9E2D4" letter-spacing="4">BULK DISCOUNT</text>
    <line x1="180" y1="148" x2="320" y2="148" stroke="#B8965A" stroke-opacity="0.45" stroke-width="1"/>

    <!-- up front -->
    <text x="250" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="15" letter-spacing="5" fill="#938A82" font-weight="600">UP FRONT</text>
    <text x="250" y="298" text-anchor="middle" font-family="Georgia, serif" font-size="72" fill="#E9E2D4" font-weight="600">$500</text>

    <!-- on sale -->
    <text x="250" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="15" letter-spacing="5" fill="#938A82" font-weight="600">ON SALE</text>
    <text x="250" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="56" fill="#938A82">—</text>

    <!-- divider -->
    <line x1="90" y1="510" x2="410" y2="510" stroke="#2A2430" stroke-width="1"/>

    <!-- total -->
    <text x="250" y="558" text-anchor="middle" font-family="Georgia, serif" font-size="15" letter-spacing="5" fill="#B8965A" font-weight="700">TOTAL</text>
    <text x="250" y="660" text-anchor="middle" font-family="Georgia, serif" font-size="92" fill="#E9E2D4" font-weight="700">$500</text>

    <!-- tagline -->
    <text x="250" y="720" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#E9E2D4">Paid once. More now.</text>
    <text x="250" y="755" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#938A82">Clean break. No further claim.</text>
  </g>

  <!-- ============ PATH II — FUTURE RETURNS ============ -->
  <g transform="translate(540 230)">
    <rect width="500" height="780" fill="#15121A" stroke="#2A2430" stroke-width="1" rx="3"/>

    <text x="250" y="68" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="28" fill="#B8965A" letter-spacing="2">II.</text>
    <text x="250" y="122" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="30" fill="#E9E2D4" letter-spacing="4">FUTURE RETURNS</text>
    <line x1="180" y1="148" x2="320" y2="148" stroke="#B8965A" stroke-opacity="0.45" stroke-width="1"/>

    <!-- up front -->
    <text x="250" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="15" letter-spacing="5" fill="#938A82" font-weight="600">UP FRONT</text>
    <text x="250" y="298" text-anchor="middle" font-family="Georgia, serif" font-size="72" fill="#E9E2D4" font-weight="600">$300</text>

    <!-- on sale -->
    <text x="250" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="15" letter-spacing="5" fill="#938A82" font-weight="600">ON SALE</text>
    <text x="250" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="60" fill="#E9E2D4" font-weight="600">+ $560</text>

    <!-- divider -->
    <line x1="90" y1="510" x2="410" y2="510" stroke="#2A2430" stroke-width="1"/>

    <!-- total -->
    <text x="250" y="558" text-anchor="middle" font-family="Georgia, serif" font-size="15" letter-spacing="5" fill="#B8965A" font-weight="700">TOTAL</text>
    <text x="250" y="660" text-anchor="middle" font-family="Georgia, serif" font-size="92" fill="#E9E2D4" font-weight="700">$860</text>

    <!-- tagline -->
    <text x="250" y="720" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#E9E2D4">Paid twice. More total.</text>
    <text x="250" y="755" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#938A82">Patient. Bigger ceiling.</text>
  </g>

  <!-- footnote -->
  <text x="540" y="1042" text-anchor="middle" font-family="Georgia, serif" font-size="13" letter-spacing="2" fill="#938A82">Per piece. Example: $1,000 floor. Artist keeps 80% of upside above recoup.</text>
  <text x="540" y="1068" text-anchor="middle" font-family="Georgia, serif" font-size="12" letter-spacing="2" fill="#B8965A">dankomphalos.com</text>
</svg>
