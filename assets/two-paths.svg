<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-label="Dank Omphalos — Three paths for the artist with example calculations">
  <title>Three paths for the artist</title>
  <defs>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#8A2433" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#8A2433" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="botGlow" cx="100%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#B8965A" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#B8965A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mark" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#B8965A"/>
      <stop offset="30%" stop-color="#B8965A"/>
      <stop offset="32%" stop-color="#3A1018"/>
      <stop offset="100%" stop-color="#3A1018"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1350" fill="#0B090C"/>
  <rect width="1080" height="1350" fill="url(#topGlow)"/>
  <rect width="1080" height="1350" fill="url(#botGlow)"/>

  <!-- brand -->
  <g transform="translate(540 95)" font-family="Georgia, serif">
    <circle cx="-180" cy="-7" r="14" fill="url(#mark)" stroke="#B8965A" stroke-opacity="0.55" stroke-width="1"/>
    <text x="-150" y="0" text-anchor="start" font-size="26" font-weight="700" letter-spacing="4.5" fill="#E9E2D4">DANK OMPHALOS</text>
  </g>

  <!-- kicker -->
  <text x="540" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="18" letter-spacing="6" fill="#B8965A" font-weight="700">THREE PATHS FOR THE ARTIST</text>
  <line x1="500" y1="198" x2="580" y2="198" stroke="#B8965A" stroke-opacity="0.55" stroke-width="1"/>

  <!-- ============ I — STANDARD RATE ============ -->
  <g transform="translate(24 230)" font-family="Georgia, serif">
    <rect width="336" height="1010" fill="#15121A" stroke="#2A2430" stroke-width="1" rx="3"/>

    <text x="168" y="60" text-anchor="middle" font-style="italic" font-size="26" fill="#B8965A" letter-spacing="2">I.</text>
    <text x="168" y="115" text-anchor="middle" font-weight="700" font-size="26" fill="#E9E2D4" letter-spacing="4">STANDARD</text>
    <text x="168" y="153" text-anchor="middle" font-weight="700" font-size="26" fill="#E9E2D4" letter-spacing="4">RATE</text>
    <line x1="118" y1="180" x2="218" y2="180" stroke="#B8965A" stroke-opacity="0.45" stroke-width="1"/>

    <text x="168" y="240" text-anchor="middle" font-size="15" letter-spacing="3" fill="#938A82">5 ALTERS &#215; $100</text>

    <text x="168" y="320" text-anchor="middle" font-size="14" letter-spacing="4" fill="#938A82" font-weight="600">UP FRONT</text>
    <text x="168" y="400" text-anchor="middle" font-size="64" fill="#E9E2D4" font-weight="600">$500</text>

    <text x="168" y="480" text-anchor="middle" font-size="14" letter-spacing="4" fill="#938A82" font-weight="600">ON SALE</text>
    <text x="168" y="555" text-anchor="middle" font-size="52" fill="#938A82">&#8212;</text>

    <line x1="58" y1="620" x2="278" y2="620" stroke="#2A2430" stroke-width="1"/>

    <text x="168" y="680" text-anchor="middle" font-size="14" letter-spacing="4" fill="#B8965A" font-weight="700">TOTAL</text>
    <text x="168" y="785" text-anchor="middle" font-size="78" fill="#E9E2D4" font-weight="700">$500</text>

    <text x="168" y="870" text-anchor="middle" font-style="italic" font-size="20" fill="#E9E2D4">The baseline.</text>
    <text x="168" y="910" text-anchor="middle" font-size="13" fill="#938A82">Full rate. Paid once.</text>
    <text x="168" y="935" text-anchor="middle" font-size="13" fill="#938A82">No further claim.</text>
  </g>

  <!-- ============ II — BULK DISCOUNT ============ -->
  <g transform="translate(372 230)" font-family="Georgia, serif">
    <rect width="336" height="1010" fill="#15121A" stroke="#2A2430" stroke-width="1" rx="3"/>

    <text x="168" y="60" text-anchor="middle" font-style="italic" font-size="26" fill="#B8965A" letter-spacing="2">II.</text>
    <text x="168" y="115" text-anchor="middle" font-weight="700" font-size="26" fill="#E9E2D4" letter-spacing="4">BULK</text>
    <text x="168" y="153" text-anchor="middle" font-weight="700" font-size="26" fill="#E9E2D4" letter-spacing="4">DISCOUNT</text>
    <line x1="118" y1="180" x2="218" y2="180" stroke="#B8965A" stroke-opacity="0.45" stroke-width="1"/>

    <text x="168" y="240" text-anchor="middle" font-size="15" letter-spacing="3" fill="#938A82">10 ALTERS &#215; $80</text>

    <text x="168" y="320" text-anchor="middle" font-size="14" letter-spacing="4" fill="#938A82" font-weight="600">UP FRONT</text>
    <text x="168" y="400" text-anchor="middle" font-size="64" fill="#E9E2D4" font-weight="600">$800</text>

    <text x="168" y="480" text-anchor="middle" font-size="14" letter-spacing="4" fill="#938A82" font-weight="600">ON SALE</text>
    <text x="168" y="555" text-anchor="middle" font-size="52" fill="#938A82">&#8212;</text>

    <line x1="58" y1="620" x2="278" y2="620" stroke="#2A2430" stroke-width="1"/>

    <text x="168" y="680" text-anchor="middle" font-size="14" letter-spacing="4" fill="#B8965A" font-weight="700">TOTAL</text>
    <text x="168" y="785" text-anchor="middle" font-size="78" fill="#E9E2D4" font-weight="700">$800</text>

    <text x="168" y="870" text-anchor="middle" font-style="italic" font-size="20" fill="#E9E2D4">More pieces.</text>
    <text x="168" y="910" text-anchor="middle" font-size="13" fill="#938A82">Bigger upfront. Paid once.</text>
    <text x="168" y="935" text-anchor="middle" font-size="13" fill="#938A82">No further claim.</text>
  </g>

  <!-- ============ III — FUTURE CUT ============ -->
  <g transform="translate(720 230)" font-family="Georgia, serif">
    <rect width="336" height="1010" fill="#15121A" stroke="#B8965A" stroke-opacity="0.5" stroke-width="1.5" rx="3"/>

    <text x="168" y="60" text-anchor="middle" font-style="italic" font-size="26" fill="#B8965A" letter-spacing="2">III.</text>
    <text x="168" y="115" text-anchor="middle" font-weight="700" font-size="26" fill="#E9E2D4" letter-spacing="4">FUTURE CUT</text>
    <text x="168" y="153" text-anchor="middle" font-weight="700" font-size="26" fill="#E9E2D4" letter-spacing="4">DISCOUNT</text>
    <line x1="118" y1="180" x2="218" y2="180" stroke="#B8965A" stroke-opacity="0.6" stroke-width="1"/>

    <text x="168" y="240" text-anchor="middle" font-size="15" letter-spacing="3" fill="#938A82">20 ALTERS &#215; $60</text>

    <text x="168" y="320" text-anchor="middle" font-size="14" letter-spacing="4" fill="#938A82" font-weight="600">UP FRONT</text>
    <text x="168" y="400" text-anchor="middle" font-size="64" fill="#E9E2D4" font-weight="600">$1,200</text>

    <text x="168" y="480" text-anchor="middle" font-size="14" letter-spacing="4" fill="#938A82" font-weight="600">ON SALE</text>
    <text x="168" y="555" text-anchor="middle" font-size="52" fill="#E9E2D4" font-weight="600">+ $2,520</text>
    <text x="168" y="590" text-anchor="middle" font-size="12" letter-spacing="2" fill="#938A82" font-style="italic">20 &#215; 90% &#215; ($200 &#8722; $60)</text>

    <line x1="58" y1="620" x2="278" y2="620" stroke="#B8965A" stroke-opacity="0.35" stroke-width="1"/>

    <text x="168" y="680" text-anchor="middle" font-size="14" letter-spacing="4" fill="#B8965A" font-weight="700">TOTAL</text>
    <text x="168" y="785" text-anchor="middle" font-size="78" fill="#E9E2D4" font-weight="700">$3,720</text>

    <text x="168" y="870" text-anchor="middle" font-style="italic" font-size="20" fill="#E9E2D4">Patient. Biggest ceiling.</text>
    <text x="168" y="910" text-anchor="middle" font-size="13" fill="#938A82">Paid up front, then again</text>
    <text x="168" y="935" text-anchor="middle" font-size="13" fill="#938A82">on every sale.</text>
  </g>

  <!-- footer -->
  <text x="540" y="1290" text-anchor="middle" font-family="Georgia, serif" font-size="14" letter-spacing="2" fill="#938A82">Example: every piece resells at $200. Future Cut resale share = 90% &#215; (resale &#8722; up-front per piece).</text>
  <text x="540" y="1325" text-anchor="middle" font-family="Georgia, serif" font-size="13" letter-spacing="3" fill="#B8965A">dankomphalos.com</text>
</svg>
