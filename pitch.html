<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Dank Omphalos — An open offer to artists</title>
<meta name="description" content="An open offer to artists: bulk commissions, paid up front, paid again at sale. Non-exclusive." />
<!-- #LLM-generated — pitch page (EN / ES / IT). Mobile-first. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Palette drawn from Viviane Freitas' painting — ember & twilight. */
    --bg:#0C0A14; --paper:#181321; --ink:#ECE6F0; --muted:#9C90AC;
    --line:#2C2438; --brass:#E2A24E; --oxblood:#8A2433; --teal:#43BCB0;
    --display:'Cinzel','Marcellus SC','Cormorant Garamond',Georgia,serif;
    --serif:'Cormorant Garamond','Iowan Old Style',Palatino,Georgia,serif;
    --body:'EB Garamond',ui-serif,Georgia,serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:17px;line-height:1.55;
       -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
       background-image:
         radial-gradient(900px 480px at 6% -8%,rgba(217,99,58,.16),transparent 58%),
         radial-gradient(800px 460px at 100% 110%,rgba(67,188,176,.11),transparent 56%)}
  a{color:inherit}
  .wrap{max-width:560px;margin:0 auto;padding:0 22px 60px}

  /* language pills */
  .lang{display:flex;justify-content:center;gap:8px;padding:18px 0 4px}
  .lang button{font-family:var(--display);font-size:11px;letter-spacing:.18em;font-weight:600;
    text-transform:uppercase;background:transparent;color:var(--muted);
    border:1px solid var(--line);padding:9px 14px;border-radius:999px;cursor:pointer;
    transition:.15s;-webkit-tap-highlight-color:transparent}
  .lang button:hover{color:var(--ink)}
  .lang button.active{color:var(--ink);border-color:var(--brass);background:rgba(184,150,90,.08)}
  .lang button:focus-visible{outline:2px solid var(--brass);outline-offset:2px}

  /* brand */
  .brand{display:flex;align-items:center;justify-content:center;gap:14px;padding:34px 0 4px}
  .brand .mark{width:22px;height:22px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,var(--brass) 0 30%,transparent 32%),
               radial-gradient(circle at 60% 80%,var(--oxblood),#3A1018 70%);
    box-shadow:inset 0 0 0 1px rgba(184,150,90,.55),0 0 12px rgba(184,150,90,.25)}
  .brand .word{font-family:var(--display);font-weight:700;font-size:21px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--ink);line-height:1}

  /* kicker + title */
  .kicker{text-align:center;font-family:var(--display);font-size:11px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--brass);margin:18px 0 0;font-weight:600}
  h1{text-align:center;font-family:var(--serif);font-weight:600;
    font-size:clamp(34px,9.4vw,52px);line-height:1.05;letter-spacing:.005em;
    margin:18px 0 14px;text-shadow:0 1px 28px rgba(184,150,90,.16)}
  .rule{width:60px;height:1px;background:var(--brass);opacity:.55;border:0;margin:0 auto 30px}

  /* points */
  .point{margin:24px 0 30px}
  .point .num{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--brass);
    margin:0 0 4px;letter-spacing:.04em}
  .point h2{font-family:var(--serif);font-weight:600;font-size:22px;line-height:1.2;
    margin:0 0 8px;color:var(--ink)}
  .point p{margin:0;color:var(--muted);font-size:17px;line-height:1.55}

  /* sub italic lines */
  .subs{margin:34px 0 6px;text-align:center}
  .subs p{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--muted);
    margin:0 0 10px;line-height:1.45}

  /* footer */
  .foot{margin:36px auto 0;padding-top:22px;border-top:1px solid var(--line);
    text-align:center;color:var(--muted);font-size:13px;letter-spacing:.04em}
  .foot a{color:var(--brass);text-decoration:none;border-bottom:1px solid transparent}
  .foot a:hover{border-color:var(--brass)}
  .foot .ct{display:block;margin-top:8px;font-size:12px;letter-spacing:.06em}

  @media (max-width:380px){
    .lang button{font-size:10px;letter-spacing:.14em;padding:8px 11px}
    .brand .word{font-size:18px}
    h1{font-size:clamp(30px,9vw,46px)}
  }
</style>
</head>
<body>
<div class="wrap">

  <nav class="lang" aria-label="Language">
    <button type="button" data-lang="en">English</button>
    <button type="button" data-lang="es">Español</button>
    <button type="button" data-lang="it">Italiano</button>
  </nav>

  <div class="brand"><span class="mark" aria-hidden="true"></span><span class="word">Dank Omphalos</span></div>

  <p class="kicker" data-i18n="kicker"></p>
  <h1 data-i18n="title"></h1>
  <hr class="rule" />

  <section class="point">
    <p class="num">I.</p>
    <h2 data-i18n="p1head"></h2>
    <p data-i18n="p1body"></p>
  </section>

  <section class="point">
    <p class="num">II.</p>
    <h2 data-i18n="p2head"></h2>
    <p data-i18n="p2body"></p>
  </section>

  <section class="point">
    <p class="num">III.</p>
    <h2 data-i18n="p3head"></h2>
    <p data-i18n="p3body"></p>
  </section>

  <div class="subs">
    <p data-i18n="sub1"></p>
    <p data-i18n="sub2"></p>
  </div>

  <footer class="foot">
    <a href="https://www.instagram.com/dankomphalos/" target="_blank" rel="noopener">@dankomphalos</a>
    &nbsp;·&nbsp;
    <a href="mailto:hello@dankomphalos.com">hello@dankomphalos.com</a>
    <span class="ct" data-i18n="ct"></span>
  </footer>

</div>

<script>
"use strict";

/* Translations. LLM-generated — review with a native speaker before sending. */
const i18n = {
  en: {
    title_tag: "Dank Omphalos — An open offer to artists",
    kicker:   "An open offer to artists",
    title:    "Big commissions.<br>Patient sales.",
    p1head:   "I commission in bulk &mdash; and pay up front.",
    p1body:   "Pick a body of work &mdash; a deck of alters, a series.<br>Paid at commission. Make it on your own time.",
    p2head:   "Non-exclusive. Always.",
    p2body:   "No lock-in. Keep every other deal you already have.<br>This is a home for some of your work &mdash; never all of it.",
    p3head:   "When a piece sells, you get paid again.",
    p3body:   "I hold each piece until a floor price we set together.<br>On sale, I recoup the commission &mdash; most of the upside is yours.",
    sub1:     "No auctions. No countdowns. No 25% chipped off every sale.",
    sub2:     "Your alters get played with &mdash; not sealed in a vault &mdash; until they sell.",
    ct:       "Get in touch &mdash; let's talk."
  },
  es: {
    title_tag: "Dank Omphalos — Una oferta abierta a los artistas",
    kicker:   "Una oferta abierta a los artistas",
    title:    "Grandes encargos.<br>Ventas pacientes.",
    p1head:   "Encargo en grandes cantidades &mdash; y pago por adelantado.",
    p1body:   "Elige un cuerpo de obra &mdash; un mazo de alters, una serie.<br>Pagado al encargar. Trabájalo a tu propio ritmo.",
    p2head:   "No exclusivo. Siempre.",
    p2body:   "Sin compromisos. Mantén todos los demás acuerdos que ya tienes.<br>Esto es un hogar para parte de tu obra &mdash; nunca para toda.",
    p3head:   "Cuando una pieza se vende, cobras de nuevo.",
    p3body:   "Conservo cada pieza hasta un precio mínimo que acordamos juntos.<br>Al venderse, recupero el encargo &mdash; la mayor parte del margen es para ti.",
    sub1:     "Sin subastas. Sin cuentas atrás. Sin un corte del 25% en cada venta.",
    sub2:     "Tus alters se juegan &mdash; no se guardan en una bóveda &mdash; hasta que se vendan.",
    ct:       "Pongámonos en contacto."
  },
  it: {
    title_tag: "Dank Omphalos — Un'offerta aperta agli artisti",
    kicker:   "Un'offerta aperta agli artisti",
    title:    "Grandi commissioni.<br>Vendite pazienti.",
    p1head:   "Commissiono in grandi quantità &mdash; e pago in anticipo.",
    p1body:   "Scegli un corpo di lavoro &mdash; un mazzo di alter, una serie.<br>Pagato alla commissione. Lavoraci con i tuoi tempi.",
    p2head:   "Non esclusivo. Sempre.",
    p2body:   "Nessun vincolo. Mantieni ogni altro accordo che hai già.<br>Questa è una casa per una parte del tuo lavoro &mdash; mai per tutto.",
    p3head:   "Quando un pezzo si vende, vieni pagato di nuovo.",
    p3body:   "Tengo ogni pezzo fino a un prezzo minimo che fissiamo insieme.<br>Alla vendita, recupero la commissione &mdash; la maggior parte del margine è tua.",
    sub1:     "Niente aste. Niente conti alla rovescia. Niente 25% sottratto a ogni vendita.",
    sub2:     "I tuoi alter vengono giocati &mdash; non sigillati in una cassaforte &mdash; finché non si vendono.",
    ct:       "Mettiamoci in contatto."
  }
};

const supported = ["en","es","it"];

function setLang(lang){
  if(!supported.includes(lang)) lang = "en";
  document.documentElement.lang = lang;
  document.title = i18n[lang].title_tag;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.innerHTML = i18n[lang][el.dataset.i18n] || "";
  });
  document.querySelectorAll(".lang button").forEach(b => {
    const on = b.dataset.lang === lang;
    b.classList.toggle("active", on);
    b.setAttribute("aria-pressed", on ? "true" : "false");
  });
  try { localStorage.setItem("do_lang", lang); } catch(e){}
  const url = new URL(location.href);
  url.searchParams.set("lang", lang);
  history.replaceState(null, "", url);
}

function initialLang(){
  const q = new URLSearchParams(location.search).get("lang");
  if(q && supported.includes(q)) return q;
  try {
    const ls = localStorage.getItem("do_lang");
    if(ls && supported.includes(ls)) return ls;
  } catch(e){}
  const nav = (navigator.language || "en").slice(0,2).toLowerCase();
  return supported.includes(nav) ? nav : "en";
}

document.querySelectorAll(".lang button").forEach(b => {
  b.addEventListener("click", () => setLang(b.dataset.lang));
});
setLang(initialLang());
</script>
</body>
</html>
