<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Dank Omphalos — alters & original art</title>
<meta name="description" content="Hand-altered trading cards and original work from a small circle of artists." />
<!-- #LLM-generated — v1 draft: catalogue + enquire (no checkout). Loads gothic fonts from Google Fonts; falls back to system serif offline. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#0B090C; --paper:#15121A; --ink:#E9E2D4; --muted:#938A82;
    --line:#2A2430; --brass:#B8965A; --oxblood:#8A2433; --good:#6E9079;
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 14px 40px rgba(0,0,0,.55);
    --display:'Cinzel','Marcellus SC','Cormorant Garamond',Georgia,serif;
    --serif:'Cormorant Garamond','Iowan Old Style',Palatino,Georgia,'Times New Roman',serif;
    --sans:'EB Garamond',ui-serif,Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:17px;line-height:1.6;
       -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
       background-image:radial-gradient(1200px 600px at 50% -8%,rgba(138,36,51,.10),transparent 60%),
                        radial-gradient(900px 500px at 100% 100%,rgba(184,150,90,.06),transparent 55%)}
  a{color:inherit}
  img{max-width:100%;display:block}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}

  /* Header */
  header{position:sticky;top:0;z-index:20;background:rgba(11,9,12,.82);
         backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;justify-content:space-between;height:68px}
  .brand{font-family:var(--display);font-size:24px;font-weight:700;letter-spacing:.16em;
         text-transform:uppercase;text-decoration:none;color:var(--ink);
         display:flex;align-items:center;gap:14px;line-height:1}
  .brand .mark{width:26px;height:26px;border-radius:50%;
       background:radial-gradient(circle at 50% 38%,var(--brass) 0 28%,transparent 30%),
                  conic-gradient(from 210deg,var(--oxblood),var(--brass),var(--oxblood));
       box-shadow:inset 0 0 0 1px rgba(0,0,0,.4),0 0 14px rgba(184,150,90,.25)}
  nav a{font-size:14px;letter-spacing:.04em;text-decoration:none;color:var(--muted);
        margin-left:26px;padding:6px 0;border-bottom:2px solid transparent}
  nav a:hover,nav a.active{color:var(--ink);border-color:var(--brass)}
  @media(max-width:560px){nav a{margin-left:16px;font-size:13px}.brand{font-size:15px;letter-spacing:.12em}}

  /* Hero */
  .hero{padding:96px 0 72px;text-align:center;border-bottom:1px solid var(--line);position:relative;
        background:radial-gradient(680px 360px at 50% 12%,rgba(138,36,51,.14),transparent 70%)}
  .hero h1{font-family:var(--serif);font-weight:600;font-size:clamp(38px,6.4vw,68px);
           line-height:1.06;margin:0 0 18px;letter-spacing:.005em;
           text-shadow:0 1px 30px rgba(184,150,90,.18)}
  .hero p{max-width:600px;margin:0 auto 28px;color:var(--muted);font-size:18px}
  .kicker{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--brass);margin-bottom:18px}
  .btn{display:inline-block;font-size:14px;letter-spacing:.05em;text-decoration:none;
       padding:13px 24px;border-radius:2px;border:1px solid var(--ink);background:var(--ink);
       color:var(--cream);cursor:pointer;transition:.15s}
  .btn:hover{background:transparent;color:var(--ink)}
  .btn.ghost{background:transparent;color:var(--ink);margin-left:10px}
  .btn.ghost:hover{background:var(--ink);color:var(--cream)}

  /* Sections */
  section.block{padding:64px 0}
  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:28px;
        border-bottom:1px solid var(--line);padding-bottom:14px}
  .head h2{font-family:var(--serif);font-weight:500;font-size:30px;margin:0}
  .head a{font-size:13px;letter-spacing:.04em;color:var(--muted);text-decoration:none}
  .head a:hover{color:var(--ink)}
  .lead{max-width:640px;color:var(--muted);font-size:17px;margin:0 0 36px}

  /* Grid of pieces */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
  @media(max-width:860px){.grid{grid-template-columns:repeat(2,1fr);gap:18px}}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:3px;overflow:hidden;
        box-shadow:var(--shadow);cursor:pointer;transition:.18s;text-align:left}
  .card:hover{transform:translateY(-3px);box-shadow:0 2px 4px rgba(33,28,22,.06),0 16px 40px rgba(33,28,22,.12)}
  .art{aspect-ratio:3/4;position:relative;display:flex;align-items:flex-end;padding:14px;
       color:#fff;font-family:var(--serif)}
  .art .frame{position:absolute;inset:9px;border:1px solid rgba(184,150,90,.55);border-radius:2px;pointer-events:none}
  .art .ttl{position:relative;font-size:17px;text-shadow:0 1px 8px rgba(0,0,0,.45)}
  .badge{position:absolute;top:11px;right:11px;font-family:var(--sans);font-size:11px;letter-spacing:.08em;
         text-transform:uppercase;padding:4px 9px;border-radius:999px;background:rgba(0,0,0,.42);color:#fff}
  .badge.sold{background:var(--oxblood)}
  .badge.reserved{background:var(--brass)}
  .badge.available{background:var(--good)}
  .meta{padding:14px 16px 16px}
  .meta .pt{font-family:var(--serif);font-size:18px;margin:0 0 2px}
  .meta .by{font-family:var(--serif);font-size:17px;color:var(--ink);margin:0 0 10px}
  .meta .row{display:flex;align-items:center;justify-content:space-between}
  .tag{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--brass)}

  /* Artist cards */
  .artists{display:grid;grid-template-columns:repeat(2,1fr);gap:28px}
  @media(max-width:680px){.artists{grid-template-columns:1fr}}
  .artist{display:flex;gap:18px;background:var(--paper);border:1px solid var(--line);border-radius:3px;
          padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:.18s}
  .artist:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(33,28,22,.12)}
  .avatar{width:84px;height:84px;border-radius:50%;flex:none;box-shadow:inset 0 0 0 1px rgba(33,28,22,.12)}
  .artist h3{font-family:var(--serif);font-weight:600;font-size:28px;margin:0 0 3px}
  .artist .loc{font-size:13px;color:var(--muted);margin:0 0 8px}
  .artist p{margin:0;font-size:14px;color:var(--muted)}

  /* Detail view */
  .detail{display:grid;grid-template-columns:minmax(0,420px) 1fr;gap:48px;padding:48px 0}
  @media(max-width:760px){.detail{grid-template-columns:1fr;gap:28px;padding:32px 0}}
  .detail .art{aspect-ratio:3/4;border-radius:3px;box-shadow:var(--shadow)}
  .detail h1{font-family:var(--serif);font-weight:500;font-size:38px;margin:0 0 6px}
  .detail .by{color:var(--muted);font-size:20px;margin:0 0 22px}
  .detail .by a{color:var(--brass);text-decoration:none}
  .detail .by a:hover{text-decoration:underline}
  .spec{width:100%;border-collapse:collapse;margin:0 0 26px}
  .spec td{padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  .spec td:first-child{color:var(--muted);width:130px;letter-spacing:.03em}
  .blurb{color:var(--muted);font-size:16px;margin:0 0 28px}
  .availline{font-size:13px;letter-spacing:.06em;text-transform:uppercase;margin:0 0 22px}
  .availline.available{color:var(--good)}.availline.reserved{color:var(--brass)}.availline.sold{color:var(--oxblood)}
  .back{display:inline-block;font-size:13px;color:var(--muted);text-decoration:none;margin:8px 0 0;letter-spacing:.04em}
  .back:hover{color:var(--ink)}

  /* Profile header */
  .profile{display:flex;gap:26px;align-items:center;padding:48px 0 8px}
  .profile .avatar{width:128px;height:128px}
  .profile h1{font-family:var(--serif);font-weight:600;font-size:52px;margin:0 0 4px}
  .profile .loc{color:var(--muted);margin:0 0 10px}
  .profile p{margin:0;color:var(--muted);max-width:560px}
  @media(max-width:560px){.profile{flex-direction:column;text-align:center;align-items:center}}

  footer{border-top:1px solid var(--line);background:var(--paper);margin-top:40px}
  footer .wrap{display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;align-items:center;
               padding:30px 24px;color:var(--muted);font-size:13px}
  footer a{color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <a class="brand" href="#/"><span class="mark"></span>Dank Omphalos</a>
    <nav id="nav">
      <a href="#/alters">Alters</a>
      <a href="#/artists">Artists</a>
    </nav>
  </div>
</header>

<main id="app"></main>

<footer>
  <div class="wrap">
    <span>Dank Omphalos — alters &amp; original art</span>
    <span><a href="https://www.instagram.com/dankomphalos/" target="_blank" rel="noopener">@dankomphalos</a> &nbsp;·&nbsp; <a href="mailto:hello@dankomphalos.com">hello@dankomphalos.com</a></span>
  </div>
</footer>
<script>
"use strict";

/* ------------------------------------------------------------------ *
 * SEED DATA — placeholder. Swap in real artists & pieces here.
 * piece.status: "available" | "reserved" | "sold"
 * piece.type:   "alter" (altered card) | "painting" | "original"
 * Add piece.image = "assets/xyz.jpg" to use a real photo instead of
 * the generated placeholder art. (assets/ is gitignored — host separately.)
 * ------------------------------------------------------------------ */
const DATA = {
  artists: [
    { id:"vela",  name:"Vela Marchetti", loc:"Lisbon, PT",
      bio:"Oil-on-card miniaturist. Vela treats a 63×88mm card like a tiny canvas — layered glazes, gold leaf, and a patience that shows.",
      links:{ instagram:"#" } },
    { id:"koa",   name:"Koa Lindqvist", loc:"Malmö, SE",
      bio:"Ink and gouache. Bold linework and folklore creatures bleeding past the card border. Also paints larger panel work.",
      links:{ instagram:"#" } },
    { id:"renza", name:"Renza Okonkwo", loc:"Lagos / London",
      bio:"Acrylic and mixed media. Portraits and pattern, heavy texture, colour you can feel from across the room.",
      links:{ instagram:"#" } },
  ],
  pieces: [
    { id:"p1", title:"Gilded Heron",       artist:"vela",  type:"alter",    card:"alter of a Crane archetype card",
      medium:"Oil & gold leaf on card", year:2026, price:"£640",  status:"available",
      blurb:"A full-border extension in oil, with hand-applied gold leaf in the negative space. One of a kind." },
    { id:"p2", title:"Wolf at the Threshold", artist:"koa", type:"alter",   card:"alter of a Direwolf card",
      medium:"Ink & gouache on card", year:2026, price:"£420", status:"available",
      blurb:"Linework spills past the frame; the wolf steps out of its own card." },
    { id:"p3", title:"Marigold Study",     artist:"renza", type:"painting", card:null,
      medium:"Acrylic on panel, 24×30cm", year:2025, price:"£1,150", status:"available",
      blurb:"An original panel — the larger sibling of Renza's card work." },
    { id:"p4", title:"Tide Serpent",       artist:"koa",   type:"alter",    card:"alter of a Sea Serpent card",
      medium:"Ink & gouache on card", year:2025, price:"£480", status:"reserved",
      blurb:"A serpent coiling out of the sea and out of its frame — deep blues and a single bright scale." },
    { id:"p5", title:"Quiet Empress",      artist:"vela",  type:"alter",    card:"alter of a Queen archetype card",
      medium:"Oil on card", year:2025, price:"£720", status:"sold",
      blurb:"Sold. Shown here as part of Vela's catalogue." },
    { id:"p6", title:"Pattern Saint",      artist:"renza", type:"alter",    card:"alter of an Angel card",
      medium:"Acrylic & gold pen on card", year:2026, price:"£560", status:"available",
      blurb:"Heavy texture and repeating motif — almost a textile on cardstock." },
    { id:"p7", title:"Hollow Lantern",     artist:"koa",   type:"painting", card:null,
      medium:"Gouache on board, 20×20cm", year:2026, price:"£780", status:"available",
      blurb:"A small original. Folklore creature, lantern light, a lot of dark." },
  ],
};

/* --------------------------- helpers --------------------------- */
const $app = document.getElementById("app");
const artistById = id => DATA.artists.find(a => a.id === id);
const piecesByArtist = id => DATA.pieces.filter(p => p.artist === id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// deterministic placeholder gradient from a string seed
function hash(str){ let h=0; for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))|0; return Math.abs(h); }
function artStyle(seed){
  const h=hash(seed); const a=h%360, b=(a+38+h%60)%360;
  return `background:linear-gradient(155deg,hsl(${a} 34% 20%),hsl(${b} 30% 9%))`;
}
function avatarStyle(seed){
  const h=hash(seed); const a=h%360;
  return `background:radial-gradient(circle at 35% 30%,hsl(${a} 32% 34%),hsl(${(a+40)%360} 30% 12%))`;
}
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);

function pieceArt(p, withFrame){
  const img = p.image ? `style="${artStyle(p.id)};background-image:url('${esc(p.image)}');background-size:cover;background-position:center"` : `style="${artStyle(p.id)}"`;
  return `<div class="art" ${img}>
      ${withFrame?'<div class="frame"></div>':''}
      <span class="badge ${p.status}">${cap(p.status)}</span>
      ${withFrame?`<span class="ttl">${esc(p.title)}</span>`:''}
    </div>`;
}

function pieceCard(p){
  const a = artistById(p.artist);
  return `<a class="card" href="#/piece/${p.id}">
      ${pieceArt(p,false)}
      <div class="meta">
        <p class="pt">${esc(p.title)}</p>
        <p class="by">${esc(a?a.name:'Unknown')}</p>
        <div class="row"><span class="tag">${p.type==='alter'?'Alter':'Original'}</span></div>
      </div>
    </a>`;
}

function artistCard(a){
  const n = piecesByArtist(a.id).length;
  return `<a class="artist" href="#/artist/${a.id}">
      <div class="avatar" style="${avatarStyle(a.id)}"></div>
      <div>
        <h3>${esc(a.name)}</h3>
        <p class="loc">${esc(a.loc)} · ${n} ${n===1?'piece':'pieces'}</p>
        <p>${esc(a.bio)}</p>
      </div>
    </a>`;
}

function enquireHref(p){
  const a = artistById(p.artist);
  const subj = `Enquiry: "${p.title}" by ${a?a.name:''}`;
  const body =
`Hello,

I'd like to enquire about "${p.title}" by ${a?a.name:''}.

[ your message ]

— sent from dankomphalos.com`;
  return `mailto:hello@dankomphalos.com?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
}

/* ----------------------------- views ----------------------------- */
function viewHome(){
  const featured = DATA.pieces.filter(p=>p.status==='available').slice(0,3);
  return `
  <section class="hero"><div class="wrap">
    <div class="kicker">Altered cards &amp; original art</div>
    <h1>The card<br>as a canvas.</h1>
    <p>Hand-altered trading cards and original work, from a small circle of artists we love.</p>
    <a class="btn" href="#/alters">Browse the work</a>
    <a class="btn ghost" href="#/artists">Meet the artists</a>
  </div></section>

  <section class="block"><div class="wrap">
    <div class="head"><h2>Available now</h2><a href="#/alters">View all →</a></div>
    <div class="grid">${featured.map(pieceCard).join("")}</div>
  </div></section>`;
}

function viewAlters(){
  const order = { available:0, reserved:1, sold:2 };
  const sorted = [...DATA.pieces].sort((a,b)=>(order[a.status]-order[b.status]));
  return `<section class="block"><div class="wrap">
    <div class="head"><h2>Alters &amp; originals</h2><a href="#/artists">Browse by artist →</a></div>
    <p class="lead">Every piece is one of a kind. See something you love? Send an enquiry.</p>
    <div class="grid">${sorted.map(pieceCard).join("")}</div>
  </div></section>`;
}

function viewArtists(){
  return `<section class="block"><div class="wrap">
    <div class="head"><h2>The artists</h2><a href="#/alters">See the work →</a></div>
    <p class="lead">The artists behind the work.</p>
    <div class="artists">${DATA.artists.map(artistCard).join("")}</div>
  </div></section>`;
}

function viewArtist(id){
  const a = artistById(id);
  if(!a) return viewNotFound();
  const work = piecesByArtist(id);
  return `<div class="wrap">
    <div class="profile">
      <div class="avatar" style="${avatarStyle(a.id)}"></div>
      <div>
        <h1>${esc(a.name)}</h1>
        <p class="loc">${esc(a.loc)}</p>
        <p>${esc(a.bio)}</p>
      </div>
    </div>
    <a class="back" href="#/artists">← All artists</a>
  </div>
  <section class="block"><div class="wrap">
    <div class="head"><h2>Work by ${esc(a.name)}</h2></div>
    <div class="grid">${work.length?work.map(pieceCard).join(""):'<p class="lead">No pieces listed yet.</p>'}</div>
  </div></section>`;
}

function viewPiece(id){
  const p = DATA.pieces.find(x=>x.id===id);
  if(!p) return viewNotFound();
  const a = artistById(p.artist);
  const buyable = p.status==='available';
  const cta = buyable
    ? `<a class="btn" href="${enquireHref(p)}">Enquire to buy</a>`
    : (p.status==='reserved'
        ? `<a class="btn" href="${enquireHref(p)}">Join the waitlist</a>`
        : `<a class="btn ghost" href="#/artist/${p.artist}">See more from ${esc(a?a.name:'this artist')}</a>`);
  const availLabel = {available:'Available',reserved:'Reserved',sold:'Sold'}[p.status];
  return `<div class="wrap"><div class="detail">
    <div>${pieceArt(p,true)}</div>
    <div>
      <h1>${esc(p.title)}</h1>
      <p class="by">by <a href="#/artist/${p.artist}">${esc(a?a.name:'Unknown')}</a></p>
      <p class="blurb">${esc(p.blurb)}</p>
      <table class="spec">
        <tr><td>Type</td><td>${p.type==='alter'?'Altered card':'Original'}</td></tr>
        ${p.card?`<tr><td>Card</td><td>${esc(p.card)}</td></tr>`:''}
        <tr><td>Medium</td><td>${esc(p.medium)}</td></tr>
        <tr><td>Year</td><td>${esc(p.year)}</td></tr>
        <tr><td>Edition</td><td>One of a kind</td></tr>
      </table>
      <p class="availline ${p.status}">${availLabel}</p>
      ${cta}
      <div><a class="back" href="#/alters">← Back to the gallery</a></div>
    </div>
  </div></div>`;
}

function viewNotFound(){
  return `<section class="block"><div class="wrap" style="text-align:center;padding:80px 0">
    <h2 style="font-family:var(--serif);font-weight:500">Not found</h2>
    <p class="lead" style="margin:0 auto">That page doesn't exist (yet).</p>
    <a class="btn" href="#/">Home</a>
  </div></section>`;
}

/* ----------------------------- router ----------------------------- */
function route(){
  const hash = location.hash.replace(/^#/, "") || "/";
  const parts = hash.split("/").filter(Boolean); // e.g. ["piece","p1"]
  let html, navKey="";
  if(parts.length===0){ html=viewHome(); }
  else if(parts[0]==="alters"){ html=viewAlters(); navKey="alters"; }
  else if(parts[0]==="artists"){ html=viewArtists(); navKey="artists"; }
  else if(parts[0]==="artist"&&parts[1]){ html=viewArtist(parts[1]); navKey="artists"; }
  else if(parts[0]==="piece"&&parts[1]){ html=viewPiece(parts[1]); navKey="alters"; }
  else { html=viewNotFound(); }

  $app.innerHTML = html;
  document.querySelectorAll("#nav a").forEach(a=>{
    a.classList.toggle("active", a.getAttribute("href")===`#/${navKey}`);
  });
  window.scrollTo(0,0);
}
window.addEventListener("hashchange", route);
route();
</script>
</body>
</html>
